services:
  observer-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: observer-mcp:local
    container_name: observer-mcp-local
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER:-observer}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-observer}?sslmode=disable
      MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-observer}?authSource=admin
      MCP_MONGO_DATABASE: ${MCP_MONGO_DATABASE:-observer}
      MCP_MONGO_COLLECTION: ${MCP_MONGO_COLLECTION:-live_step_buffers}
      MCP_TRANSPORT: http
      MCP_HTTP_ADDR: :8080
      MCP_HEALTH_ADDR: :9090
      MCP_READ_TIMEOUT_SECONDS: ${MCP_READ_TIMEOUT_SECONDS:-15}
    ports:
      - "0.0.0.0:${MCP_HTTP_PORT:-18080}:8080"
      - "0.0.0.0:${MCP_HEALTH_PORT:-9090}:9090"
    networks:
      - observer-shared

networks:
  observer-shared:
    external: true
    name: ${OBSERVER_DOCKER_NETWORK:-observer_observer-net}
