image:
  repository: ghcr.io/stanterprise/observer-mcp
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

replicaCount: 1

service:
  port: 8080
  healthPort: 9090

runtime:
  existingSecret: observer-runtime-env

env:
  MCP_TRANSPORT: http
  MCP_HTTP_ADDR: ":8080"
  MCP_MONGO_DATABASE: observer
  MCP_MONGO_COLLECTION: live_step_buffers
  MCP_HEALTH_ADDR: ":9090"
  MCP_READ_TIMEOUT_SECONDS: "15"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

nodeSelector: {}
tolerations: []
affinity: {}
