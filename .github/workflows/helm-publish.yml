name: Helm Chart Publishing

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/helm-publish.yml"
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
    paths:
      - "charts/**"
      - ".github/workflows/helm-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_NAME: observer-mcp

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: |
          helm lint charts/observer-mcp

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Template rendering and manifest validation
        run: |
          set -euo pipefail

          mkdir -p /tmp/observer-mcp-renders

          render_and_validate() {
            local name="$1"
            shift

            echo "Rendering ${name}..."
            helm template observer-mcp charts/observer-mcp "$@" > "/tmp/observer-mcp-renders/${name}.yaml"

            echo "Validating ${name} manifests with kubeconform..."
            kubeconform -summary -ignore-missing-schemas "/tmp/observer-mcp-renders/${name}.yaml"
          }

          render_and_validate default
          render_and_validate custom-secret \
            --set runtime.existingSecret=my-runtime-env
          render_and_validate http-transport \
            --set env.MCP_TRANSPORT=http \
            --set env.MCP_HTTP_ADDR=":8080"

  package-push:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # For branch pushes and workflow_dispatch: use chart version + short SHA
            CHART_VERSION=$(grep '^version:' charts/observer-mcp/Chart.yaml | awk '{print $2}')
            VERSION="${CHART_VERSION}-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $VERSION"

      - name: Update chart version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/observer-mcp/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/observer-mcp/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package charts/observer-mcp --version ${{ steps.version.outputs.version }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push ${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}/charts

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz
          retention-days: 30
